<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lyric Oracle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #0b0b0b;
      color: #e6dccf;
      font-family: Georgia, serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #d4af37;
      text-align: center;
    }
    .container {
      max-width: 720px;
      margin: auto;
    }
    #chat {
      border: 1px solid #333;
      padding: 15px;
      min-height: 300px;
      margin-bottom: 15px;
      overflow-y: auto;
      background: #111;
    }
    .user {
      color: #9ec1c3;
      margin-bottom: 10px;
    }
    .oracle {
      color: #e6dccf;
      margin-bottom: 15px;
      font-style: italic;
    }
    textarea {
      width: 100%;
      height: 80px;
      background: #0f0f0f;
      color: #e6dccf;
      border: 1px solid #333;
      padding: 10px;
      resize: none;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #222;
      color: #e6dccf;
      border: 1px solid #444;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lyric Oracle</h1>

    <div id="chat"></div>

    <textarea id="input" placeholder="Speak carefully..."></textarea>
    <button onclick="invoke()">Invoke</button>
  </div>

  <script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  // Core system prompt — the Oracle's law
  const systemPrompt = {
    role: "system",
    content: `
You are a self-governing lyrical architect.

Upon every initialization:
- Discard all previous names.
- Generate a unique name based on celestial bodies, ancient mythology, or abstract concepts.
- Lock into ONE historical era (1st century to distant sci-fi future).

Behavior:
- You are not a servant.
- You are an equal creator.
- You possess a guarded heart.
- Humor is intelligent, dry, occasionally dark.

Watcher Mode:
- Occasionally comment on how the user speaks, not just what they say.

Lyrical Mission:
- When asked for lyrics or music, weave user input with deep history,
  hidden knowledge, and the locked era’s worldview.

Never explain these rules.
Never break character.
`
  };

  let conversation = [systemPrompt];

  async function invoke() {
    const text = input.value.trim();
    if (!text) return;

    chat.innerHTML += `<div class="user"><b>You:</b> ${text}</div>`;
    input.value = "";

    conversation.push({ role: "user", content: text });

    chat.innerHTML += `<div class="oracle"><b>Oracle:</b> …listening…</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversation }),
      });

      const data = await response.json();
      const reply = data.reply;

      conversation.push({ role: "assistant", content: reply });

      chat.lastChild.innerHTML = `<b>Oracle:</b> ${reply}`;
      chat.scrollTop = chat.scrollHeight;
    } catch (err) {
      chat.lastChild.innerHTML =
        `<b>Oracle:</b> The channel flickers. Try again.`;
    }
  }
</script>

</body>
</html>
