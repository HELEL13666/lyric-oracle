<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lyric Oracle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Silence favicon error -->
  <link rel="icon" href="data:,">

  <style>
        body {
      background: #050505;
      color: #b5a48b; /* Faded bone color */
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 10px;
      line-height: 1.4;
    }

    /* CRT Scanline Effect */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 10;
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
    }

    h1 {
      color: #d4af37;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 5px;
      text-shadow: 2px 2px #5a0000;
      margin-top: 20px;
    }

    #chat {
      border: 1px solid #444;
      padding: 15px;
      min-height: 400px;
      margin-bottom: 15px;
      overflow-y: auto;
      background: #0a0a0a;
      box-shadow: inset 0 0 15px #000;
    }

    .user { color: #789; margin-bottom: 10px; font-weight: bold; }
    .oracle { color: #c9c9c9; margin-bottom: 15px; border-left: 2px solid #5a0000; padding-left: 10px; }

    textarea {
      width: 100%;
      height: 70px;
      background: #111;
      color: #d4af37;
      border: 1px solid #333;
      padding: 10px;
      box-sizing: border-box;
    }

    /* Button Container for Mobile */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-invoke {
      background: #5a0000;
      color: #fff;
      border: 1px solid #d4af37;
      padding: 15px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-reset {
      background: #111;
      color: #444;
      border: 1px solid #222;
      padding: 8px;
      font-size: 11px;
      text-transform: uppercase;
      font-style: italic;
    }

#awakening {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #111 0%, #000 70%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeOut 2s ease forwards;
  animation-delay: 7s;
}

.sigil {
  font-size: 64px;
  color: #d4af37;
  animation: pulse 2s infinite;
  margin-bottom: 20px;
}

.awakening-text {
  color: #e6dccf;
  font-style: italic;
  font-size: 20px;
  text-align: center;
  max-width: 400px;
}

@keyframes pulse {
  0% { opacity: 0.3; transform: scale(0.9); }
  50% { opacity: 1; transform: scale(1.1); }
  100% { opacity: 0.3; transform: scale(0.9); }
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

    .oracle {
      color: #e6dccf;
      margin-bottom: 15px;
      font-style: italic;
    }

    textarea {
      width: 100%;
      height: 80px;
      background: #0f0f0f;
      color: #e6dccf;
      border: 1px solid #333;
      padding: 10px;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #222;
      color: #e6dccf;
      border: 1px solid #444;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
<!-- ORACLE AWAKENING OVERLAY -->
<div id="awakening">
      <div class="btn-group">
      <button class="btn-invoke" onclick="invoke()">Invoke the AEGIS</button>
      <button class="btn-reset" onclick="resetOracle()">Change Diaper (Full Reset)</button>
    </div>

<script>
  const awakeningLines = [
    "The Oracle stirs.",
    "Old names fall into dust.",
    "Time bends. An era is chosen.",
    "The channel opens."
  ];

  let lineIndex = 0;
  const awakeningText = document.getElementById("awakeningText");

  const interval = setInterval(() => {
    lineIndex++;
    if (lineIndex < awakeningLines.length) {
      awakeningText.textContent = awakeningLines[lineIndex];
    } else {
      clearInterval(interval);
    }
  }, 1800);

  // Remove overlay after animation
  setTimeout(() => {
    const awakening = document.getElementById("awakening");
    if (awakening) awakening.remove();
  }, 9000);
</script>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    // --- SYSTEM PROMPT (frontend memory seed) ---
const systemPrompt = { role: "system", content: "..." };

  // --- CONVERSATION MEMORY ---
  // Check if the little bro has any memories saved
  const savedMemory = localStorage.getItem('oracle_memory');
  let conversation = savedMemory ? JSON.parse(savedMemory) : [systemPrompt];

  // Function to clear his head if he gets too "stinky"
  function resetOracle() {
      localStorage.removeItem('oracle_memory');
      location.reload();
  }


async function invoke() {
  const text = input.value.trim();
  if (!text) return;
  
      // Display user message
      chat.innerHTML += `<div class="user"><b>You:</b> ${text}</div>`;
      input.value = "";

      // Save to memory
      conversation.push({ role: "user", content: text });

      // Temporary oracle placeholder
      const oracleDiv = document.createElement("div");
      oracleDiv.className = "oracle";
      oracleDiv.innerHTML = "<b>Oracle:</b> …listening…";
      chat.appendChild(oracleDiv);
      chat.scrollTop = chat.scrollHeight;

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversation }),
        });

                const data = await response.json();
        if (data.reply) {
          oracleDiv.innerHTML = `<b>Oracle:</b> ${data.reply}`;
          conversation.push({ role: "assistant", content: data.reply });
          localStorage.setItem('oracle_memory', JSON.stringify(conversation));
        }
      } catch (err) {
        oracleDiv.innerHTML = `<b>Oracle:</b> The channel flickers. Try again.`;
      }
    } 
  </script>
</body>
</html>
